<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Buscador de Expedientes</title>

<style>
body { font-family: Arial; padding:20px; background:#f9f6ef; }
input { padding:10px; width:300px; border:1px solid #c9a96e; border-radius:6px; }
.card { border:1px solid #e0d3b8; margin:10px 0; padding:10px; background:white; border-radius:8px; }
</style>
</head>

<body>

<h2>🔎 Buscador</h2>

<input id="buscador" placeholder="Buscar..." disabled>
<p id="estado">Cargando datos...</p>

<div id="resultados"></div>

<script>
let datos = [];

function limpiar(t){
  return (t || "").toString().toLowerCase();
}

async function cargarHoja(nombre, responsable){

  let url = `https://docs.google.com/spreadsheets/d/1rw1RyEKMKzIBasNQe_l6gQAajsRM_-9mFw5QEDBCvN4/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombre)}`;

  let res = await fetch(url);
  let text = await res.text();

  let json = JSON.parse(text.substring(47).slice(0, -2));

  let rows = json.table.rows || [];

  return rows.map(r => {
    let valores = r.c.map(c => c ? c.v : "").join(" ");

    return {
      texto: limpiar(valores),
      caratula: r.c[0]?.v || "",
      detalle: r.c[1]?.v || "",
      responsable
    };
  });
}

async function iniciar(){

  let facu = await cargarHoja("Dr. Facundo", "Facu");
  let ese = await cargarHoja("Dr. Esequiel", "Esequiel");
  let javi = await cargarHoja("Dr. Javier", "Javier");

  datos = [...facu, ...ese, ...javi];

  document.getElementById("estado").innerText =
    "Datos cargados ✔ (" + datos.length + " casos)";

  document.getElementById("buscador").disabled = false;
}

iniciar();

document.getElementById("buscador").addEventListener("input", function(){

  let v = limpiar(this.value);

  let filtrados = datos.filter(d => d.texto.includes(v));

  let html = "";

  filtrados.forEach(item => {
    html += `
      <div class="card">
        <b>${item.caratula}</b><br>
        ${item.detalle}<br>
        <i>${item.responsable}</i>
      </div>
    `;
  });

  document.getElementById("resultados").innerHTML = html || "Sin resultados";
});
</script>

</body>
</html>
